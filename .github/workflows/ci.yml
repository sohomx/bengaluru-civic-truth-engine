name: civic-action-engine-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install Python package
        run: python -m pip install -e .
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Python unit tests
        run: python -m unittest discover -s tests
      - name: Registry validation
        run: python -m civic_data registry validate
      - name: Packet eval
        run: |
          if [ -f data/normalized/wards.json ] && [ -f data/normalized/works.json ]; then
            python -m civic_data eval packets --suite tests/fixtures/packet_eval/civic_packets_v1.jsonl --warehouse-root data/normalized --raw-root data/raw
          else
            echo "Skipping packet eval: normalized public warehouse is not checked into this public repo."
          fi
      - name: Packet RAG deterministic eval
        run: python -m civic_data eval packet-rag --suite tests/fixtures/packet_eval/packet_rag_v1.jsonl --mode deterministic
      - name: Retrieval qrels eval
        run: |
          if [ -f data/normalized/wards.json ] && [ -f data/normalized/works.json ]; then
            python -m civic_data eval retrieval --suite tests/fixtures/packet_eval/evidence_qrels_v1.jsonl --warehouse-root data/normalized --raw-root data/raw
          else
            echo "Skipping retrieval qrels eval: normalized public warehouse is not checked into this public repo."
          fi
      - name: Frontend build
        working-directory: web
        run: npm ci && npm run build
